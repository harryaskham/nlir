# nlir example / default configuration.
#
# `~/.config/nlir/config.yaml` is where the whole language lives: nlir is a small
# stack machine, and the operators, their fixity/priority/arity/types, the models,
# the prompts, the coercions, and the tests are all defined here. This file is the
# starter config nlir writes to `~/.config/nlir/config.yaml` on first run; edit it
# to taste. See SPEC.md for the full contract.
#
# `llm`-mode operators call the models below. `det` mode (`--mode det`) uses only
# the deterministic realisations (`command:` / `reduce:` / `template:` / `join:`),
# so the numeric and template operators work offline with no API key. Set
# `ANTHROPIC_API_KEY` in the environment to use the `haiku` model.

defaults:
  mode: llm
  # Model size tiers: an operator names a tier (small | medium | large) and it
  # resolves through here. A single `model: sonnet` (a concrete `models` alias) is
  # also still valid — tiers are opt-in and back-compatible.
  #
  # `medium` is the ops' default = `sonnet` (the claude CLI, type: command): resilient,
  # no network-proxy dependency. In the wasm/browser playground a command-kind MODEL op
  # still routes to the LLM realiser (the browser has no shell, so the op's prompt goes
  # to the Settings BYO base-url + model-id) - the model kind only selects the NATIVE
  # transport (CLI vs HTTP), not the browser path, so browser llm-mode works too.
  model:
    small: haiku
    medium: sonnet
    large: opus
  parallelism: 8

context:
  env: NLIR_CONTEXT
  file_default: ~/.config/nlir/context.json
  messages:
    key: _messages
    role_field: role
    content_field: content
    views: # ^ / ^_ / ^* / ^/ / ^!
      default: [assistant]
      user: [user]
      all: [user, assistant, system]
      system: [system]
      tool: [tool, tool_result, function]
  defaults:
    _sep: "\n" # list & message-range → text separator
    _cache: true

types: # coercion targets (deterministic parse first, LLM fallback)
  number:
    model: sonnet
    prompt: |
      Interpret the text inside <text> as a single number. Return only the number.

      %
    schema: { type: object, properties: { result: { type: number } }, required: [result] }
  bool:
    model: sonnet
    prompt: |
      Interpret the text inside <text> as a boolean. Return exactly `true` or `false`
      in lowercase, with no other text, punctuation, capitalisation, or explanation.

      %
    schema: { type: object, properties: { result: { type: boolean } }, required: [result] }
  # string: numbers/bools/lists stringify deterministically (lists join with _sep)

sessions:
  pi:
    format: pi
    keep_roles: [user, assistant]
    drop_tool_messages: true
    role_field: role
    content_field: content

models:
  haiku:
    type: anthropic_messages
    base_url: $ANTHROPIC_BASE_URL
    api_key: $ANTHROPIC_API_KEY
    model: claude-haiku-4-5
    format: json
    result_field: result
    messages:
      - role: system
        content: |
          ${NLIR_SYSTEM_PROMPT}
          ${NLIR_STRUCTURED_PROMPT}
      - role: user
        content: |
          ${NLIR_PROMPT}
    output_config:
      format:
        type: json_schema
        schema:
          type: object
          properties: { result: { type: string } }
          required: [result]
          additionalProperties: false

  sonnet:
    type: command
    format: text
    command: claude --model claude-sonnet-5 --append-system-prompt "${NLIR_SYSTEM_PROMPT}" --print "${NLIR_PROMPT}"

  opus:
    type: command
    format: text
    command: pi --no-extensions --no-session --model github-copilot/claude-opus-4.8 --system-prompt "${NLIR_SYSTEM_PROMPT}" --print "${NLIR_PROMPT}"

  # Direct HTTP against a LiteLLM proxy speaking the Anthropic Messages API.
  direct:
    type: anthropic_messages
    base_url: ${LITELLM_BASE_URL}/v1
    api_key: $LITELLM_MASTER_KEY
    model: claude-sonnet-5
    format: text
    messages:
      - role: system
        content: "${NLIR_SYSTEM_PROMPT}"
      - role: user
        content: "${NLIR_PROMPT}"

prompts:
  system: { env: NLIR_SYSTEM_PROMPT, text: "Perform the following text transformation task.\nRespond with the transformed text in plain language.\nDo not include <text> tags in your output." }
  structured: { env: NLIR_STRUCTURED_PROMPT, text: "Format your response as JSON containing only a \"result\" field with the transformation, no preamble." }
  unstructured: { env: NLIR_UNSTRUCTURED_PROMPT, text: "Output only the text result of your transformation with no preamble." }

operators: # `%` = operand under replacement; `%%` = literal %
  subject:
    op: "#"
    template: "subject: %"  # det-stub (det mode); model+prompt below realise llm mode
    description: |
      The text's primary subject as a short noun phrase — a topic label, not a definition. Over a list, folds to the common category.
    arity: 1
    fixity: prefix
    model: medium
    prompt: |
      Extract the primary subject of the text inside <text> as a short noun phrase. Return only that noun phrase.

      %
  not:
    op: "!"
    description: |
      Negates the claim, clause-wise (so !(a&b)=neither); on a lone concept-word, its antonym. Involution: !!x=x.
    arity: 1
    fixity: prefix
    template: "not %"
    model: medium
    prompt: |
      Negate the text inside <text>...</text>, changing nothing else.

      %
  and:
    op: "&"
    description: |
      Joins operands into one 'X and Y' statement (a plan, not boolean AND); nullary & folds the premise stack.
    arity: ">0"
    fixity: mixfix
    join: " and "
    model: medium
    prompt: |
      Combine the <text> items with an "and" connective into one text meaning "t_0 and t_1 and ...".

      %
  or:
    op: "|"
    description: |
      Joins operands into one 'X or Y' choice, kept as genuine alternatives.
    arity: ">0"
    fixity: mixfix
    join: " or "
    model: medium
    prompt: |
      Combine the <text> items with an "or" connective into one text meaning "t_0 or t_1 or ...".

      %
  question:
    op: "?"
    description: |
      Turns the text into a question (postfix). A yes/no question is polarity-neutral (!x? is approximately x?).
    arity: 1
    fixity: postfix
    priority: 0
    template: "is it the case that %?"
    model: opus
    prompt: |
      Convert the text inside <text> into a question, preserving subject and meaning.

      %
  summary:
    op: "~"
    template: "summary: %"  # det-stub (det mode); model+prompt below realise llm mode
    description: |
      The essence in one short sentence — drops specifics for the gist. Saturates (~~x is approximately ~x); folds a list to its consensus.
    arity: 1
    fixity: prefix
    model: medium
    prompt: |
      Summarise the text inside <text> in one short sentence. Return only the summary.

      %
  formal:
    op: "@"
    template: "formal: %"  # det-stub (det mode); model+prompt below realise llm mode
    description: |
      Rewrites in a formal, professional register, meaning preserved. Saturates after one pass; distributes over &.
    arity: 1
    fixity: prefix
    model: medium
    prompt: |
      Rewrite the text inside <text> in a formal, professional tone, preserving meaning. Return only the rewritten text.

      %
  simplify:
    op: ":"
    template: "simple: %"  # det-stub (det mode); model+prompt below realise llm mode
    description: |
      Rewrites in plain, simple language (strips jargon). The one op that reliably maps per-item over a list.
    arity: 1
    fixity: prefix
    model: medium
    prompt: |
      Rewrite the text inside <text> in plain, simple language a child could understand. Return only the rewritten text.

      %
  expand:
    op: ">"
    template: "expanded: %"  # det-stub (det mode); model+prompt below realise llm mode
    description: |
      Adds detail and explanation (lengthens). Forks over | (keeps paths distinct), integrates over &.
    arity: 1
    fixity: prefix
    model: medium
    prompt: |
      Expand the text inside <text> with more detail and explanation, preserving meaning. Return only the expanded text.

      %
  shorten:
    op: "<"
    description: |
      Tightens to the information floor — fewest words, but keeps EVERY fact and figure (vs ~ = the gist).
    arity: 1
    fixity: prefix
    model: medium
    prompt: |
      Make the text inside <text> more concise while preserving meaning. Return only the shortened text.

      %
  diff:
    op: "Δ"
    template: "diff: %0 -> %1"  # trivial det-stub (det mode); model realises llm mode. TODO det: field for meaningful bool/diff (msm-0)
    description: |
      Directional diff: what changed from the first text to the second — added, removed, or shifted. Non-commutative (aΔb ≠ bΔa); powers before/after, drift, changelog.
    arity: 2
    fixity: infix
    model: medium
    prompt: |
      Describe what changed from the first <text> to the second <text>: what was added, removed, or shifted. This is directional (first → second), not a symmetric comparison. Return only the description.

      %
  implication-check:
    op: "~>"
    template: "true"  # trivial det-stub (det mode); model realises llm mode. TODO det: field for meaningful bool/diff (msm-0)
    description: |
      Does the LHS imply the RHS? Integrates over &
    arity: 2
    fixity: infix
    model: medium
    prompt: |
      Return 'true' if the content of the first <text> implies the content of the second <text>, otherwise return 'false'.

      %
  implication-infer:
    op: "~>?"
    template: "%"  # trivial det-stub (det mode); model realises llm mode. TODO det: field for meaningful bool/diff (msm-0)
    description: |
      Returns the implication of its arguments. Integrates over &.
    arity: ">0"
    fixity: mixfix
    model: medium
    prompt: |
      Return the primary implication of the pieces of information contained inside <text> tags, preserving style and no extraneous information.

      %
  echo:
    op: "_"
    arity: 2
    fixity: infix
    description: "Repeats the text N times, space-joined (x_2 = 'x x'). The one shell-command-realised operator — not LLM, not arithmetic."
    command: |
      t="${NLIR_ARGS[0]}"; n="${NLIR_ARGS[1]}"; out="$t"
      for i in $(seq 1 $((n-1))); do out="$out $t"; done
      printf '%s' "$out"
  add:
    op: "+"
    description: |
      Sum of the numeric operands (variadic; words/units/bases coerce to numbers first).
    arity: ">0"
    fixity: mixfix
    priority: 11
    operands: number
    result: number
    reduce: add
  mul:
    op: "*"
    description: |
      Product of the numeric operands (variadic).
    arity: ">0"
    fixity: mixfix
    priority: 12
    operands: number
    result: number
    reduce: mul
  sub:
    op: "-"
    description: |
      Difference, a minus b (binary, left-associative).
    arity: 2
    fixity: infix
    priority: 11
    operands: number
    result: number
    reduce: sub
  div:
    op: "/"
    description: |
      Quotient, a divided by b (binary; guards divide-by-zero).
    arity: 2
    fixity: infix
    priority: 12
    operands: number
    result: number
    reduce: div
  pow:
    op: "**"
    description: |
      a to the power b — RIGHT-associative, so 2**3**2 = 2**(3**2) = 512 (matches math/Python).
    arity: 2
    fixity: infix
    priority: 13
    assoc: right
    operands: number
    result: number
    reduce: pow
  concat:
    op: "++"
    description: |
      Concatenate the string operands (variadic): "foo"++"bar" -> "foobar".
    arity: ">0"
    fixity: mixfix
    priority: 10
    operands: string
    result: string
    reduce: concat
  split:
    op: "//"
    description: |
      Split a string by a separator into a list (binary): "a,b,c"//"," -> [a, b, c].
      An empty separator splits into characters.
    arity: 2
    fixity: infix
    priority: 13
    operands: string
    result: list
    reduce: split

  # Glyph operators (bd-44c294): bind ANY sigil (a word, or a multibyte glyph —
  # no ASCII-scarcity cost, like Δ) to a FORM or a BUILTIN, as an alt to
  # command:/prompt:. Uncomment to try; the user owns their config's sigil space.
  #
  # form:  the operator applies a form to its operands ($0, $1, …):
  #   square:   { op: "□", arity: 1, fixity: prefix, form: "{$0*$0}" }    # □5 → 25
  #   steelman: { op: "⇑", arity: 1, fixity: prefix, form: "{~(>@$0)}" }  # ⇑x = summarise(expand(formalise(x)))
  # builtin:  bind a glyph to the map/fold engine:
  #   mapop:  { op: "↦", arity: 2, fixity: infix, builtin: map }   # {$0*$0}↦[1,2,3] → [1,4,9]
  #   foldop: { op: "⊘", arity: 2, fixity: infix, builtin: fold }  # {$0+$1}⊘[1,2,3,4] → 10

tests:
  det-echo: { mode: det, expr: "xxx_2", expected: "xxx xxx" }
  det-not: { mode: det, expr: "!foo", expected: "not foo" }
  det-and: { mode: det, expr: "a&b&c", expected: "a and b and c" }
  det-or: { mode: det, expr: "a|b", expected: "a or b" }
  det-group: { mode: det, expr: "!(a&b)", expected: "not (a and b)" }
  det-quote: { mode: det, expr: "'one two'", expected: "one two" }
  det-sep: { mode: det, expr: "_sep=\\ ;[a,b]", expected: "a b" }
  det-assign: { mode: det, expr: "k=foo;$k", expected: "foo" }
  det-dollar-escape: { mode: det, expr: 'k=world;"\$k"', expected: '$k' }
  num-add: { mode: det, expr: "1+2+3", expected: "6" }
  num-prec: { mode: det, expr: "1+2*3", expected: "7" }
  num-prec2: { mode: det, expr: "2+3*4-1", expected: "13" }
  num-mul: { mode: det, expr: "2*3*4", expected: "24" }
  num-sub: { mode: det, expr: "10-4", expected: "6" }
  num-div: { mode: det, expr: "12/3", expected: "4" }
  num-index: { mode: det, expr: "(1+1)**3", expected: "8" }
  num-powassoc: { mode: det, expr: "2**3**2", expected: "512" }
  str-concat: { mode: det, expr: '"foo"++"bar"++"baz"', expected: "foobarbaz" }
  str-split: { mode: det, expr: '_sep=\ ;"a,b,c"//","', expected: "a b c" }
  str-split-chars: { mode: det, expr: '_sep=\ ;"abc"//""', expected: "a b c" }
  str-split-map: { mode: det, expr: '_sep=\ ;$map%({$0++$0},"a,b"//",")', expected: "aa bb" }
  # quote-eval (bd-5dd86f): `{…}` quotes a form — evaluation is INERT (the form is
  # returned as data, not run), it round-trips through render (precedence kept),
  # and a form is a first-class value you can bind to a name and read back.
  form-quote-inert: { mode: det, expr: "{2+3}",      expected: "{(2 + 3)}" }
  form-quote-strop: { mode: det, expr: "{a&b}",      expected: "{(a & b)}" }
  form-quote-prec:  { mode: det, expr: "{1+2*3}",    expected: "{(1 + (2 * 3))}" }
  form-bind-read:   { mode: det, expr: "f={2+3};$f", expected: "{(2 + 3)}" }
  # quote-eval apply (bd-5dd86f): `%` calls a form, binding args to $0/$1… from an
  # argument frame — tuple `%(a,b)` ≡ list `%[a,b]` ≡ single `%x`. The frame is
  # hygienic: a form's $0 is its argument, not the run-stack top (`9;{$0}%7`→7).
  apply-inc:        { mode: det, expr: "{$0+1}%5",      expected: "6" }
  apply-add2:       { mode: det, expr: "{$0+$1}%(2,3)", expected: "5" }
  apply-add2-list:  { mode: det, expr: "{$0+$1}%[2,3]", expected: "5" }
  apply-id:         { mode: det, expr: "{$0}%7",        expected: "7" }
  apply-mul:        { mode: det, expr: "{$0*$1}%(3,4)", expected: "12" }
  apply-hygiene:    { mode: det, expr: "9;{$0}%7",      expected: "7" }
  # quote-eval named lambdas (bd-5dd86f): assign a form to a name, then read + apply
  # it — a form persists in context and stays callable via `$name%args`.
  lambda-named:     { mode: det, expr: "f={$0+$1};$f%(2,3)",       expected: "5" }
  lambda-square:    { mode: det, expr: "sq={$0*$0};$sq%5",         expected: "25" }
  lambda-inc:       { mode: det, expr: "inc={$0+1};$inc%9",        expected: "10" }
  lambda-compose:   { mode: det, expr: "dbl={$0*2};$dbl%($dbl%3)", expected: "12" }
  # quote-eval do-N-times (bd-5dd86f): `{form}_N` composes a form N times (the `_`
  # repeat lifted from text-repeat to form-compose). Apply binds tighter than `_`,
  # so the compose needs parens before `%`: `({form}_N)%seed`.
  do-n-inc3: { mode: det, expr: "({$0+1}_3)%5", expected: "8" }
  do-n-dbl2: { mode: det, expr: "({$0*2}_2)%3", expected: "12" }
  do-n-id0:  { mode: det, expr: "({$0+1}_0)%5", expected: "5" }
  do-n-named: { mode: det, expr: "g=({$0+1}_3);$g%5", expected: "8" }
  # cookbook (docs/cookbook.md): flagship multi-layer form programs — named
  # lambdas composed/nested/iterated into real deterministic little programs.
  cookbook-compose:    { mode: det, expr: "inc={$0+1};dbl={$0*2};$inc%($dbl%5)", expected: "11" }
  cookbook-nest:       { mode: det, expr: "sq={$0*$0};$sq%($sq%2)", expected: "16" }
  cookbook-tree:       { mode: det, expr: "add={$0+$1};$add%($add%(1,2),$add%(3,4))", expected: "10" }
  cookbook-pipeline:   { mode: det, expr: "inc={$0+1};dbl={$0*2};$dbl%($inc%($dbl%3))", expected: "14" }
  cookbook-pythagoras: { mode: det, expr: "sq={$0*$0};add={$0+$1};$add%($sq%3,$sq%4)", expected: "25" }
  cookbook-poly:       { mode: det, expr: "poly={($0*$0)+(2*$0)+1};$poly%5", expected: "36" }
  cookbook-repeat-named: { mode: det, expr: "inc={$0+1};(($inc)_10)%0", expected: "10" }
  cookbook-iterated:   { mode: det, expr: "inc={$0+1};sq={$0*$0};$sq%($inc%($inc%($inc%2)))", expected: "25" }
  # lists are first-class + render sep-joined (NOT collapsed): a manual map by
  # spelling out the form per element yields a real 3-element list.
  cookbook-list-firstclass: { mode: det, expr: "[1,4,9]", expected: "1\n4\n9" }
  cookbook-manual-map:      { mode: det, expr: "sq={$0*$0};[$sq%1,$sq%2,$sq%3]", expected: "1\n4\n9" }
  # map/fold higher-order builtins (bd-14af74): $map applies a form per-item →
  # a list; $fold reduces with a 2-arg form; named forms + map-reduce compose.
  cookbook-map-square:  { mode: det, expr: "$map%({$0*$0},[1,2,3])", expected: "1\n4\n9" }
  cookbook-map-inc:     { mode: det, expr: "$map%({$0+1},[10,20,30])", expected: "11\n21\n31" }
  cookbook-map-named:   { mode: det, expr: "sq={$0*$0};$map%($sq,[1,2,3])", expected: "1\n4\n9" }
  cookbook-fold-sum:    { mode: det, expr: "$fold%({$0+$1},[1,2,3,4])", expected: "10" }
  cookbook-fold-product: { mode: det, expr: "$fold%({$0*$1},[1,2,3,4])", expected: "24" }
  cookbook-map-reduce:  { mode: det, expr: "inc={$0+1};$fold%({$0+$1},$map%($inc,[1,2,3]))", expected: "9" }
  cookbook-fold-map-sq: { mode: det, expr: "$fold%({$0+$1},$map%({$0*$0},[1,2,3]))", expected: "14" }
  cookbook-map-nested:  { mode: det, expr: "$map%({$fold%({$0+$1},$0)},[[1,2],[3,4]])", expected: "3\n7" }
  msg:
    mode: det
    context:
      _messages:
        - { role: user, content: "hi" }
        - { role: assistant, content: "in rust" }
    expr: "^-1"
    expected: "in rust"
