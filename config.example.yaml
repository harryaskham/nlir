# nlir example / default configuration.
#
# `~/.config/nlir/config.yaml` is where the whole language lives: nlir is a small
# stack machine, and the operators, their fixity/priority/arity/types, the models,
# the prompts, the coercions, and the tests are all defined here. This file is the
# starter config nlir writes to `~/.config/nlir/config.yaml` on first run; edit it
# to taste. See SPEC.md for the full contract.
#
# `llm`-mode operators call the models below. `det` mode (`--mode det`) uses only
# the deterministic realisations (`command:` / `reduce:` / `template:` / `join:`),
# so the numeric and template operators work offline with no API key. Set
# `ANTHROPIC_API_KEY` in the environment to use the `haiku` model.

defaults:
  mode: llm
  model: sonnet
  parallelism: 8

context:
  env: NLIR_CONTEXT
  file_default: ~/.config/nlir/context.json
  messages:
    key: _messages
    role_field: role
    content_field: content
    views: # ^ / ^_ / ^* / ^/
      default: [assistant]
      user: [user]
      all: [user, assistant, system]
      system: [system]
  defaults:
    _sep: "\n" # list & message-range → text separator
    _cache: true

types: # coercion targets (deterministic parse first, LLM fallback)
  number:
    model: fast
    prompt: |
      Interpret the text inside <text> as a single number. Return only the number.

      %
    schema: { type: object, properties: { result: { type: number } }, required: [result] }
  bool:
    model: fast
    prompt: |
      Interpret the text inside <text> as true or false.

      %
    schema: { type: object, properties: { result: { type: boolean } }, required: [result] }
  # string: numbers/bools/lists stringify deterministically (lists join with _sep)

sessions:
  pi:
    format: pi
    keep_roles: [user, assistant]
    drop_tool_messages: true
    role_field: role
    content_field: content

models:
  haiku: *haiku
    type: anthropic_messages
    base_url: $ANTHROPIC_BASE_URL
    api_key: $ANTHROPIC_API_KEY
    model: claude-haiku-4-5
    format: json
    result_field: result
    messages:
      - role: system
        content: |
          ${NLIR_SYSTEM_PROMPT}
          ${NLIR_STRUCTURED_PROMPT}
      - role: user
        content: |
          ${NLIR_PROMPT}
    output_config:
      format:
        type: json_schema
        schema:
          type: object
          properties: { result: { type: string } }
          required: [result]
          additionalProperties: false

  sonnet:
    type: command
    format: text
    command: claude --model claude-sonnet-5 --append-system-prompt "${NLIR_SYSTEM_PROMPT}" --print "${NLIR_PROMPT}"

  copilot:
    type: command
    format: text
    command: pi --no-extensions --no-session --model github-copilot/claude-sonnet-4.6 --system-prompt "${NLIR_SYSTEM_PROMPT}" --print "${NLIR_PROMPT}"

  # Direct HTTP against a LiteLLM proxy speaking the Anthropic Messages API.
  direct:
    type: anthropic_messages
    base_url: ${LITELLM_BASE_URL}/v1
    api_key: $LITELLM_MASTER_KEY
    model: claude-sonnet-5
    format: text
    messages:
      - role: system
        content: "${NLIR_SYSTEM_PROMPT}"
      - role: user
        content: "${NLIR_PROMPT}"

  fast: *haiku

prompts:
  system: { env: NLIR_SYSTEM_PROMPT, text: "Perform the following text transformation task.\nRespond with the transformed text in plain language.\nDo not include <text> tags in your output." }
  structured: { env: NLIR_STRUCTURED_PROMPT, text: "Format your response as JSON containing only a \"result\" field with the transformation, no preamble." }
  unstructured: { env: NLIR_UNSTRUCTURED_PROMPT, text: "Output only the text result of your transformation with no preamble." }

operators: # `%` = operand under replacement; `%%` = literal %
  subject: { op: "#", description: "The text's primary subject as a short noun phrase — a topic label, not a definition. Over a list, folds to the common category.", arity: 1, fixity: prefix, model: sonnet, prompt: "Extract the primary subject of the text inside <text> as a short noun phrase. Return only that noun phrase.\n\n%" }
  not: { op: "!", description: "Negates the claim, clause-wise (so !(a&b)=neither); on a lone concept-word, its antonym. Involution: !!x=x.", arity: 1, fixity: prefix, template: "not %", model: sonnet, prompt: "Negate the text inside <text>...</text>, changing nothing else.\n\n%" }
  and: { op: "&", description: "Joins operands into one 'X and Y' statement (a plan, not boolean AND); nullary & folds the premise stack.", arity: ">0", fixity: mixfix, join: " and ", model: sonnet, prompt: "Combine the <text> items with an \"and\" connective into one text meaning \"t_0 and t_1 and ...\".\n\n%" }
  or: { op: "|", description: "Joins operands into one 'X or Y' choice, kept as genuine alternatives.", arity: ">0", fixity: mixfix, join: " or ", model: sonnet, prompt: "Combine the <text> items with an \"or\" connective into one text meaning \"t_0 or t_1 or ...\".\n\n%" }
  question: { op: "?", description: "Turns the text into a question (postfix). A yes/no question is polarity-neutral (!x? is approximately x?).", arity: 1, fixity: postfix, priority: 0, template: "is it the case that %?", model: copilot, prompt: "Convert the text inside <text> into a question, preserving subject and meaning.\n\n%" }
  summary: { op: "~", description: "The essence in one short sentence — drops specifics for the gist. Saturates (~~x is approximately ~x); folds a list to its consensus.", arity: 1, fixity: prefix, model: sonnet, prompt: "Summarise the text inside <text> in one short sentence. Return only the summary.\n\n%" }
  formal: { op: "@", description: "Rewrites in a formal, professional register, meaning preserved. Saturates after one pass; distributes over &.", arity: 1, fixity: prefix, model: sonnet, prompt: "Rewrite the text inside <text> in a formal, professional tone, preserving meaning. Return only the rewritten text.\n\n%" }
  simplify: { op: ":", description: "Rewrites in plain, simple language (strips jargon). The one op that reliably maps per-item over a list.", arity: 1, fixity: prefix, model: sonnet, prompt: "Rewrite the text inside <text> in plain, simple language a child could understand. Return only the rewritten text.\n\n%" }
  expand: { op: ">", description: "Adds detail and explanation (lengthens). Forks over | (keeps paths distinct), integrates over &.", arity: 1, fixity: prefix, model: sonnet, prompt: "Expand the text inside <text> with more detail and explanation, preserving meaning. Return only the expanded text.\n\n%" }
  shorten: { op: "<", description: "Tightens to the information floor — fewest words, but keeps EVERY fact and figure (vs ~ = the gist).", arity: 1, fixity: prefix, model: sonnet, prompt: "Make the text inside <text> more concise while preserving meaning. Return only the shortened text.\n\n%" }
  implication: { op: "~>", description: "Returns the implication of its arguments. Integrates over &.", arity: ">0", fixity: mixfix, model: sonnet, prompt: "Return the primary implication of the pieces of information contained inside <text> tags, preserving style and no extraneous information.\n\n%" }
  echo:
    op: "_"
    arity: 2
    fixity: infix
    description: "Repeats the text N times, space-joined (x_2 = 'x x'). The one shell-command-realised operator — not LLM, not arithmetic."
    command: |
      t="${NLIR_ARGS[0]}"; n="${NLIR_ARGS[1]}"; out="$t"
      for i in $(seq 1 $((n-1))); do out="$out $t"; done
      printf '%s' "$out"
  add: { op: "+", description: "Sum of the numeric operands (variadic; words/units/bases coerce to numbers first).", arity: ">0", fixity: mixfix, priority: 11, operands: number, result: number, reduce: add }
  mul: { op: "*", description: "Product of the numeric operands (variadic).", arity: ">0", fixity: mixfix, priority: 12, operands: number, result: number, reduce: mul }
  sub: { op: "-", description: "Difference, a minus b (binary, left-associative).", arity: 2, fixity: infix, priority: 11, operands: number, result: number, reduce: sub }
  div: { op: "/", description: "Quotient, a divided by b (binary; guards divide-by-zero).", arity: 2, fixity: infix, priority: 12, operands: number, result: number, reduce: div }
  pow: { op: "**", description: "a to the power b — RIGHT-associative, so 2**3**2 = 2**(3**2) = 512 (matches math/Python).", arity: 2, fixity: infix, priority: 13, assoc: right, operands: number, result: number, reduce: pow }

tests:
  det-echo: { mode: det, expr: "xxx_2", expected: "xxx xxx" }
  det-not: { mode: det, expr: "!foo", expected: "not foo" }
  det-and: { mode: det, expr: "a&b&c", expected: "a and b and c" }
  det-or: { mode: det, expr: "a|b", expected: "a or b" }
  det-group: { mode: det, expr: "!(a&b)", expected: "not (a and b)" }
  det-quote: { mode: det, expr: "'one two'", expected: "one two" }
  det-sep: { mode: det, expr: "_sep=\\ ;[a,b]", expected: "a b" }
  det-assign: { mode: det, expr: "k=foo;$k", expected: "foo" }
  det-dollar-escape: { mode: det, expr: 'k=world;"\$k"', expected: '$k' }
  num-add: { mode: det, expr: "1+2+3", expected: "6" }
  num-prec: { mode: det, expr: "1+2*3", expected: "7" }
  num-prec2: { mode: det, expr: "2+3*4-1", expected: "13" }
  num-mul: { mode: det, expr: "2*3*4", expected: "24" }
  num-sub: { mode: det, expr: "10-4", expected: "6" }
  num-div: { mode: det, expr: "12/3", expected: "4" }
  num-index: { mode: det, expr: "(1+1)**3", expected: "8" }
  num-powassoc: { mode: det, expr: "2**3**2", expected: "512" }
  msg:
    mode: det
    context:
      _messages:
        - { role: user, content: "hi" }
        - { role: assistant, content: "in rust" }
    expr: "^-1"
    expected: "in rust"
