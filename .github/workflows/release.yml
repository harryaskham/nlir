name: release

# Triggered ONLY on a pushed version tag (v*.*.*). Runs on the azure-ephemeral
# (x86) + aarch64-darwin runners using the SYSTEM Rust toolchain (rust-not-nix),
# NATIVELY per target, so `nlir self-update` (updatable-cli) has per-target
# assets. This mirrors omni-cli's release.yml. nlir is deliberately rust-not-nix
# on Linux (bd-aa78ee), so the native-cargo path is used rather than the flake.
# The ecosystem crate deps (mcp-cli/updatable-cli/feedback-cli) are PUBLIC repos
# fetched anonymously over https (no key/secret on the runner).
#
# Jobs: resolve (derive tag/version), test (full suite), build (native per
# target -> nlir-<version>-<target>.tar.gz + .sha256, smoke-tested by running the
# unpacked binary before publish, then uploaded to the Release).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build/publish assets for"
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20"

jobs:
  resolve:
    name: resolve release context
    runs-on: [self-hosted, azure-ephemeral]
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.ctx.outputs.tag }}
      version: ${{ steps.ctx.outputs.version }}
    steps:
      - id: ctx
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag || github.ref_name }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  test:
    name: test suite
    needs: resolve
    runs-on: [self-hosted, azure-ephemeral]
    timeout-minutes: 30
    steps:
      - name: Reset leftover git url rewrite (persistent-runner hygiene)
        shell: bash
        run: git config --global --unset-all url."ssh://git@github.com/".insteadOf 2>/dev/null || true
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Move cargo home off the SMB build-cache (bd-f35766 rustup hardlink fix)
        shell: bash
        run: |
          if [[ "${CARGO_HOME:-}" == /mnt/build-cache/* ]]; then
            echo "CARGO_HOME=$RUNNER_TEMP/nlir-cargo-home" >> "$GITHUB_ENV"
          fi
      - name: Ensure curl and rustup are reachable for the toolchain install (minimal step PATH)
        shell: bash
        run: |
          # dtolnay/rust-toolchain runs `command -v rustup`; if absent it curl-installs rustup.
          # This persistent runner's step shell (nix bash --noprofile --norc) has a minimal PATH
          # with neither curl NOR rustup, so BOTH the primary check and the curl fallback die
          # (`curl: command not found`, exit 127). Put the system bin dirs on PATH so curl is
          # found for the fallback, and surface an on-disk rustup for this runner user if present
          # (skips the download). Best-effort: `if`-guarded so a missing dir/binary never trips
          # `set -e`, and a trailing `exit 0` so a final short-circuited test (e.g. no on-disk
          # rustup yet, before dtolnay installs it) can never fail this job (bd-7e465a).
          for d in /usr/bin /bin /usr/local/bin /opt/homebrew/bin; do
            if [ -d "$d" ]; then echo "$d" >> "$GITHUB_PATH"; fi
          done
          for d in "$HOME/.cargo/bin" "${CARGO_HOME:-/nonexistent}/bin"; do
            if [ -x "$d/rustup" ]; then echo "$d" >> "$GITHUB_PATH"; fi
          done
          exit 0
      - name: Install Rust toolchain
        # aarch64-darwin skips dtolnay: on the nix self-hosted darwin runner its
        # composite action runs its OWN `command -v rustup` that does NOT inherit the
        # ensure-step's GITHUB_PATH, so it finds neither rustup nor curl and dies at
        # exit 127 (bd-7e465a follow-up). The Build step surfaces the login user's
        # already-installed stable toolchain instead. In the non-matrix test job
        # matrix.target is null, so this stays true and dtolnay still runs there.
        if: matrix.target != 'aarch64-darwin'
        uses: dtolnay/rust-toolchain@stable
      - name: Install C toolchain (cc linker)
        shell: bash
        run: |
          # Surface system cc even when GITHUB_PATH additions don't reach this step on
          # the self-hosted runner, and only apt-get where it exists (Linux); macOS
          # provides cc via the system/Xcode toolchain (bd-7e465a follow-up).
          for d in /usr/bin /bin; do case ":$PATH:" in *":$d:"*) ;; *) [ -d "$d" ] && PATH="$PATH:$d";; esac; done
          export PATH
          if ! command -v cc >/dev/null 2>&1 && command -v apt-get >/dev/null 2>&1; then
            SUDO=""; [ "$(id -u)" -ne 0 ] && command -v sudo >/dev/null 2>&1 && SUDO="sudo"
            $SUDO apt-get update -qq && $SUDO apt-get install -y --no-install-recommends build-essential
          fi
      - name: Use anonymous https for public crate deps
        shell: bash
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
      - name: Run the full suite
        shell: bash
        run: cargo test --all

  build:
    name: build ${{ matrix.target }}
    needs:
      - resolve
      - test
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            runner: [self-hosted, azure-ephemeral]
          - target: aarch64-darwin
            runner: [self-hosted, aarch64-darwin]
    steps:
      - name: Reset leftover git url rewrite (persistent-runner hygiene)
        shell: bash
        run: git config --global --unset-all url."ssh://git@github.com/".insteadOf 2>/dev/null || true
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move cargo home off the SMB build-cache (bd-f35766 rustup hardlink fix)
        shell: bash
        run: |
          if [[ "${CARGO_HOME:-}" == /mnt/build-cache/* ]]; then
            echo "CARGO_HOME=$RUNNER_TEMP/nlir-cargo-home" >> "$GITHUB_ENV"
          fi

      - name: Ensure curl and rustup are reachable for the toolchain install (minimal step PATH)
        shell: bash
        run: |
          # dtolnay/rust-toolchain runs `command -v rustup`; if absent it curl-installs rustup.
          # This persistent runner's step shell (nix bash --noprofile --norc) has a minimal PATH
          # with neither curl NOR rustup, so BOTH the primary check and the curl fallback die
          # (`curl: command not found`, exit 127). Put the system bin dirs on PATH so curl is
          # found for the fallback, and surface an on-disk rustup for this runner user if present
          # (skips the download). Best-effort: `if`-guarded so a missing dir/binary never trips
          # `set -e`, and a trailing `exit 0` so a final short-circuited test (e.g. no on-disk
          # rustup yet, before dtolnay installs it) can never fail this job (bd-7e465a).
          for d in /usr/bin /bin /usr/local/bin /opt/homebrew/bin; do
            if [ -d "$d" ]; then echo "$d" >> "$GITHUB_PATH"; fi
          done
          for d in "$HOME/.cargo/bin" "${CARGO_HOME:-/nonexistent}/bin"; do
            if [ -x "$d/rustup" ]; then echo "$d" >> "$GITHUB_PATH"; fi
          done
          exit 0
      - name: Install Rust toolchain
        # aarch64-darwin skips dtolnay: on the nix self-hosted darwin runner its
        # composite action runs its OWN `command -v rustup` that does NOT inherit the
        # ensure-step's GITHUB_PATH, so it finds neither rustup nor curl and dies at
        # exit 127 (bd-7e465a follow-up). The Build step surfaces the login user's
        # already-installed stable toolchain instead. In the non-matrix test job
        # matrix.target is null, so this stays true and dtolnay still runs there.
        if: matrix.target != 'aarch64-darwin'
        uses: dtolnay/rust-toolchain@stable

      - name: Install C toolchain (cc linker)
        shell: bash
        run: |
          # Surface system cc even when GITHUB_PATH additions don't reach this step on
          # the self-hosted runner, and only apt-get where it exists (Linux); macOS
          # provides cc via the system/Xcode toolchain (bd-7e465a follow-up).
          for d in /usr/bin /bin; do case ":$PATH:" in *":$d:"*) ;; *) [ -d "$d" ] && PATH="$PATH:$d";; esac; done
          export PATH
          if ! command -v cc >/dev/null 2>&1 && command -v apt-get >/dev/null 2>&1; then
            SUDO=""; [ "$(id -u)" -ne 0 ] && command -v sudo >/dev/null 2>&1 && SUDO="sudo"
            $SUDO apt-get update -qq && $SUDO apt-get install -y --no-install-recommends build-essential
          fi

      - name: Use anonymous https for public crate deps
        shell: bash
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Build the release binary (native)
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          if [ "${TARGET:-}" = "aarch64-darwin" ]; then
            # The self-hosted nix darwin runner executes job steps in a RESTRICTED env
            # (service user, HOME=/var/empty) where neither the system Apple cc
            # (/usr/bin/cc) NOR the login user's rustup toolchain is reachable, and the
            # ambient nix cargo's rustc-wrapper has no linker ("cc not found"). Only the
            # nix store is accessible, so build inside the flake devShell (nix clang +
            # cargo + libiconv). That links libiconv transitively from the NIX STORE,
            # which is not portable to a user's Mac, so rewrite that one dylib id to the
            # ABI-compatible system /usr/lib/libiconv.2.dylib and FAIL if any /nix/store
            # dep remains -- so the shipped asset links only /usr/lib. Verified locally:
            # otool then shows only /usr/lib and the rewritten binary runs (bd-7e465a).
            # Force the darwin build LOCAL to this Mac with `--builders ''`: the runner
            # nix has `builders=@/etc/nix/machines` and delegating a darwin derivation to
            # a (Linux) builder fails on darwin `__impureHostDeps` (`Cannot build
            # nlir-src.drv / feedback-cli-patched.drv`). Verified the runner's own nix
            # 2.34.7 builds `.#devShells.aarch64-darwin.default` locally (clang + otool)
            # once remote builders are disabled (bd-099010; Harry: macos builds only on
            # this self-hosted darwin box).
            nix develop '.#devShells.aarch64-darwin.default' --builders '' --command bash -c '
              set -euo pipefail
              cargo build --release --bin nlir
              bin="${CARGO_TARGET_DIR:-target}/release/nlir"
              for ref in $(otool -L "$bin" | grep -oE "/nix/store/[^ ]*libiconv[^ ]*\.dylib" || true); do
                install_name_tool -change "$ref" /usr/lib/libiconv.2.dylib "$bin"
              done
              remaining="$(otool -L "$bin" | grep /nix/store || true)"
              if [ -n "$remaining" ]; then
                echo "ERROR: darwin binary still references /nix/store (non-portable):" >&2
                echo "$remaining" >&2
                exit 1
              fi
              echo "portable darwin binary linkage:"; otool -L "$bin"
            '
          else
            cargo build --release --bin nlir
          fi

      - name: Package update-compatible asset
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          for d in /usr/bin /bin; do case ":$PATH:" in *":$d:"*) ;; *) [ -d "$d" ] && PATH="$PATH:$d";; esac; done
          export PATH
          mkdir -p dist
          root="nlir-$VERSION-$TARGET"
          rm -rf "$root"; mkdir -p "$root"
          cp "${CARGO_TARGET_DIR:-target}/release/nlir" "$root/nlir"
          tar -czf "dist/$root.tar.gz" "$root"
          shasum -a 256 "dist/$root.tar.gz" | awk '{print $1}' > "dist/$root.sha256"

      - name: Smoke the packaged binary (native target)
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          # Unpack exactly the way `nlir self-update` (updatable-cli TendrilStyle)
          # will — <root>/nlir — and run it, so a broken or mislaid binary fails
          # the release BEFORE the asset is published (the pre-publish gate).
          set -euo pipefail
          for d in /usr/bin /bin; do case ":$PATH:" in *":$d:"*) ;; *) [ -d "$d" ] && PATH="$PATH:$d";; esac; done
          export PATH
          root="nlir-$VERSION-$TARGET"
          rm -rf smoke; mkdir -p smoke
          tar -xzf "dist/$root.tar.gz" -C smoke
          "smoke/$root/nlir" --version

      - name: Upload assets to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: ${{ needs.resolve.outputs.tag }}
          files: dist/*
          fail_on_unmatched_files: true
